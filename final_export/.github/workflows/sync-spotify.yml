name: Sync Spotify

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Spotify sync endpoint
        run: |
          curl -X POST "${{ secrets.SITE_URL }}/api/internal/sync/spotify/run" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
